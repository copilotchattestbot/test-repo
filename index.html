<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Game</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="game-container">
    <h1>Snake Game</h1>
    <div class="hud">
      <div class="score">Score: <span id="score">0</span></div>
    </div>

    <div class="canvas-wrapper">
      <canvas id="gameCanvas" width="400" height="400" aria-label="Snake game canvas"></canvas>
      <div id="gameOverScreen" class="overlay hidden" role="dialog" aria-modal="true" aria-labelledby="gameOverTitle">
        <div class="overlay-card">
          <h2 id="gameOverTitle">Game Over</h2>
          <p>Your score: <span id="finalScore">0</span></p>
          <button id="restartBtn" type="button">Play Again</button>
        </div>
      </div>
    </div>

    <p class="instructions">Use the arrow keys to move the snake.</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
